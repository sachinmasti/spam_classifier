<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #06060f;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            filter: blur(80px);
            animation: orbMove 20s ease-in-out infinite alternate;
        }
        .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(120,67,233,0.3), transparent);
            top: -10%; left: -10%;
            animation-duration: 25s;
        }
        .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.2), transparent);
            bottom: -15%; right: -5%;
            animation-duration: 20s;
            animation-delay: -5s;
        }
        .orb:nth-child(3) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(168,85,247,0.15), transparent);
            top: 40%; left: 60%;
            animation-duration: 22s;
            animation-delay: -10s;
        }
        .orb:nth-child(4) {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(236,72,153,0.12), transparent);
            top: 60%; left: -5%;
            animation-duration: 18s;
            animation-delay: -3s;
        }
        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, -60px) scale(1.1); }
            66% { transform: translate(-40px, 80px) scale(0.9); }
            100% { transform: translate(60px, 40px) scale(1.05); }
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
            margin: 20px auto;
        }

        .card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 40px;
            box-shadow:
                0 32px 64px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.06);
            transition: border-color 0.5s, box-shadow 0.5s;
        }
        .card.spam-active {
            border-color: rgba(239,68,68,0.2);
            box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 60px rgba(239,68,68,0.06);
        }
        .card.ham-active {
            border-color: rgba(34,197,94,0.2);
            box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 60px rgba(34,197,94,0.06);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .logo-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .logo {
            width: 48px; height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            z-index: 1;
        }
        .logo-glow {
            position: absolute;
            inset: -4px;
            border-radius: 20px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            opacity: 0.2;
            filter: blur(12px);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.05); }
        }
        .header-text h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e0e0ff 0%, #a855f7 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-text p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            font-weight: 400;
            margin-top: 2px;
        }
        .header-badge {
            margin-left: auto;
            padding: 5px 12px;
            border-radius: 10px;
            background: rgba(168,85,247,0.1);
            border: 1px solid rgba(168,85,247,0.15);
            font-size: 11px;
            font-weight: 600;
            color: #a855f7;
            letter-spacing: 0.3px;
        }

        .input-section { margin-bottom: 20px; }
        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .input-label span {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }
        .char-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .char-badge.active { background: rgba(168,85,247,0.12); color: #a855f7; }

        textarea {
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: #e0e0ff;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            min-height: 130px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            font-family: inherit;
        }
        textarea:focus {
            border-color: rgba(168,85,247,0.3);
            box-shadow: 0 0 0 4px rgba(168,85,247,0.06);
            background: rgba(255,255,255,0.05);
        }
        textarea::placeholder { color: rgba(255,255,255,0.18); }

        .examples {
            display: flex;
            gap: 8px;
            margin: 16px 0 24px;
            flex-wrap: wrap;
        }
        .example-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        .example-btn:hover {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .predict-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .predict-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.06), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .predict-btn:hover::before { transform: translateX(100%); }
        .predict-btn:hover {
            box-shadow: 0 8px 32px rgba(168,85,247,0.25);
            transform: translateY(-1px);
        }
        .predict-btn:active { transform: scale(0.97); }
        .predict-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        .loader { display: none; margin-top: 24px; text-align: center; }
        .loader.show { display: block; }
        .loader-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid rgba(255,255,255,0.04);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-row span { font-size: 14px; color: rgba(255,255,255,0.35); }

        .result { display: none; }
        .result.show { display: block; }

        .result-banner {
            margin-top: 28px;
            padding: 20px 24px;
            border-radius: 18px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            animation: bannerIn 0.5s ease;
        }
        .result-banner.spam {
            background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.03));
            border: 1px solid rgba(239,68,68,0.15);
        }
        .result-banner.ham {
            background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(34,197,94,0.03));
            border: 1px solid rgba(34,197,94,0.15);
        }
        @keyframes bannerIn {
            0% { opacity: 0; transform: translateY(16px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .result-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            animation: iconPop 0.5s ease 0.15s both;
        }
        @keyframes iconPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .result-banner.spam .result-icon { background: rgba(239,68,68,0.15); }
        .result-banner.ham .result-icon { background: rgba(34,197,94,0.15); }
        .result-info { flex: 1; }
        .result-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        .result-banner.spam .result-label { color: #ef4444; }
        .result-banner.ham .result-label { color: #22c55e; }
        .result-title {
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }
        .result-confidence {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-top: 6px;
        }

        .conf-bar-wrap {
            margin-top: 8px;
        }
        .conf-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.04);
            overflow: hidden;
        }
        .conf-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
            width: 0;
        }
        .conf-bar .fill.spam { background: linear-gradient(90deg, #ef4444, #f97316); }
        .conf-bar .fill.ham { background: linear-gradient(90deg, #22c55e, #10b981); }

        .features-section {
            margin-top: 24px;
            animation: fadeUp 0.4s ease 0.2s both;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .features-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .features-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.04);
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }
        .feature-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
            animation: chipIn 0.3s ease both;
        }
        @keyframes chipIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .feature-chip .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .feature-chip .dot.danger { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .feature-chip .dot.safe { background: #22c55e; }
        .feature-chip .val {
            margin-left: auto;
            font-weight: 700;
            font-size: 13px;
        }
        .feature-chip .val.danger { color: #ef4444; }
        .feature-chip .val.safe { color: #22c55e; }

        .history {
            margin-top: 24px;
            animation: fadeUp 0.4s ease 0.3s both;
        }
        .history-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.04);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 170px;
            overflow-y: auto;
        }
        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            font-size: 13px;
            animation: itemIn 0.3s ease;
        }
        @keyframes itemIn {
            0% { opacity: 0; transform: translateX(-8px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .history-item .h-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .history-item .h-badge.spam { background: rgba(239,68,68,0.12); color: #ef4444; }
        .history-item .h-badge.ham { background: rgba(34,197,94,0.12); color: #22c55e; }
        .history-item .h-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: rgba(255,255,255,0.4);
        }
        .history-item .h-conf {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .history-empty {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.15);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.12);
            letter-spacing: 0.3px;
        }

        @media (max-width: 600px) {
            .card { padding: 24px; border-radius: 22px; }
            .features-grid { grid-template-columns: 1fr 1fr; }
            .header-text h1 { font-size: 20px; }
            .header-badge { display: none; }
            .orb { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="card" id="card">
            <div class="header">
                <div class="logo-wrap">
                    <div class="logo-glow"></div>
                    <div class="logo">&#9888;</div>
                </div>
                <div class="header-text">
                    <h1>Spam Classifier</h1>
                    <p>AI-powered message analysis</p>
                </div>
                <div class="header-badge">v1.0</div>
            </div>

            <div class="input-section">
                <div class="input-label">
                    <span>Enter message</span>
                    <span class="char-badge" id="charBadge"><span id="charCount">0</span> characters</span>
                </div>
                <textarea id="message" placeholder="Paste or type a message to analyze for spam..."></textarea>
            </div>

            <div class="examples">
                <button class="example-btn" data-text="Congratulations! You've won a 1000 prize. Call 09061701461 now!">&#127942; Prize scam</button>
                <button class="example-btn" data-text="Hey, are we still meeting for coffee at 3?">&#9749; Meeting</button>
                <button class="example-btn" data-text="URGENT! Your account has been compromised. Click here to verify.">&#128274; Phishing</button>
                <button class="example-btn" data-text="Happy birthday! Hope you have an amazing day!">&#127881; Greeting</button>
                <button class="example-btn" data-text="Free entry to win a FA Cup final ticket! Text FA to 87121.">&#9917; Contest</button>
            </div>

            <button class="predict-btn" id="predictBtn">
                Analyze Message
            </button>

            <div class="loader" id="loader">
                <div class="loader-row">
                    <div class="spinner"></div>
                    <span>Analyzing...</span>
                </div>
            </div>

            <div class="result" id="result">
                <div class="result-banner" id="resultBanner">
                    <div class="result-icon" id="resultIcon"></div>
                    <div class="result-info">
                        <div class="result-label" id="resultLabel"></div>
                        <div class="result-title" id="resultTitle"></div>
                        <div class="conf-bar-wrap">
                            <div class="conf-bar"><div class="fill" id="confFill"></div></div>
                        </div>
                        <div class="result-confidence" id="resultConf"></div>
                    </div>
                </div>

                <div class="features-section">
                    <div class="features-title">What the model found</div>
                    <div class="features-grid" id="featuresGrid"></div>
                </div>

                <div class="history">
                    <div class="history-title">Recent checks</div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No checks yet</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">Built with FastAPI &middot; LightGBM</div>
    </div>

    <script>
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 2.5 + 1) + 'px';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.animationDelay = (Math.random() * 20) + 's';
            p.style.opacity = Math.random() * 0.4 + 0.1;
            document.getElementById('particles').appendChild(p);
        }

        const textarea = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        const charBadge = document.getElementById('charBadge');
        const predictBtn = document.getElementById('predictBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const card = document.getElementById('card');
        const resultBanner = document.getElementById('resultBanner');
        const resultIcon = document.getElementById('resultIcon');
        const resultLabel = document.getElementById('resultLabel');
        const resultTitle = document.getElementById('resultTitle');
        const resultConf = document.getElementById('resultConf');
        const confFill = document.getElementById('confFill');
        const featuresGrid = document.getElementById('featuresGrid');
        const historyList = document.getElementById('historyList');

        const FEATURE_META = {
            has_currency: { label: 'Currency', icon: '&#36;' },
            has_url: { label: 'URL Link', icon: '&#128279;' },
            has_phone_num: { label: 'Phone Number', icon: '&#128222;' },
            uppercase_words: { label: 'SHOUTING Words', icon: '&#9650;' },
            digit_count: { label: 'Digit Count', icon: '&#35;' },
            char_count: { label: 'Message Length', icon: '&#128196;' },
        };

        function isDangerous(key, val) {
            if (key === 'has_currency' || key === 'has_url' || key === 'has_phone_num') return val === true;
            if (key === 'uppercase_words') return val > 0;
            if (key === 'digit_count') return val > 8;
            if (key === 'char_count') return val > 150;
            return false;
        }

        textarea.addEventListener('input', () => {
            const len = textarea.value.length;
            charCount.textContent = len;
            charBadge.classList.toggle('active', len > 0);
            result.classList.remove('show');
            card.className = 'card';
        });

        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                textarea.value = btn.dataset.text;
                charCount.textContent = textarea.value.length;
                charBadge.classList.add('active');
                textarea.dispatchEvent(new Event('input'));
                textarea.focus();
            });
        });

        let history = [];

        function renderFeatures(features) {
            featuresGrid.innerHTML = '';
            for (const [key, val] of Object.entries(features)) {
                const meta = FEATURE_META[key];
                if (!meta) continue;
                const danger = isDangerous(key, val);
                const chip = document.createElement('div');
                chip.className = 'feature-chip';
                chip.style.animationDelay = (Object.keys(features).indexOf(key) * 0.05) + 's';
                chip.innerHTML = `
                    <span class="dot ${danger ? 'danger' : 'safe'}"></span>
                    ${meta.icon} ${meta.label}
                    <span class="val ${danger ? 'danger' : 'safe'}">${typeof val === 'boolean' ? (val ? 'Yes' : 'No') : val}</span>
                `;
                featuresGrid.appendChild(chip);
            }
        }

        function addHistory(text, label, confidence) {
            history.unshift({ text, label, confidence });
            if (history.length > 8) history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No checks yet</div>';
                return;
            }
            historyList.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="h-badge ${item.label}">${item.label}</span>
                    <span class="h-text">${item.text}</span>
                    <span class="h-conf">${(item.confidence * 100).toFixed(0)}%</span>
                `;
                historyList.appendChild(div);
            });
        }

        predictBtn.addEventListener('click', async () => {
            const text = textarea.value.trim();
            if (!text) return;

            predictBtn.disabled = true;
            result.classList.remove('show');
            card.className = 'card';
            loader.classList.add('show');

            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                const isSpam = data.prediction === 1;
                const label = data.label;
                const conf = data.confidence;

                card.className = 'card ' + label + '-active';

                resultBanner.className = 'result-banner ' + label;
                resultIcon.textContent = isSpam ? '&#9888;' : '&#10003;';
                resultLabel.textContent = (isSpam ? 'Spam' : 'Ham') + '  \u00B7  ' + (conf * 100).toFixed(0) + '% confidence';
                resultTitle.textContent = isSpam
                    ? 'This message appears to be spam'
                    : 'This message appears safe';
                resultConf.textContent = isSpam
                    ? 'Contains spam indicators'
                    : 'No spam indicators found';

                confFill.className = 'fill ' + label;
                setTimeout(() => { confFill.style.width = (conf * 100) + '%'; }, 50);

                renderFeatures(data.features);
                addHistory(text.slice(0, 50) + (text.length > 50 ? '...' : ''), label, conf);
                result.classList.add('show');
            } catch (err) {
                resultBanner.className = 'result-banner spam';
                resultIcon.textContent = '&#10060;';
                resultLabel.textContent = 'Error';
                resultTitle.textContent = 'Something went wrong';
                resultConf.textContent = 'Please try again later';
                confFill.className = 'fill spam';
                confFill.style.width = '0%';
                featuresGrid.innerHTML = '';
                result.classList.add('show');
            } finally {
                predictBtn.disabled = false;
                loader.classList.remove('show');
            }
        });

        textarea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') predictBtn.click();
        });
    </script>
</body>
</html>
